name: dbt-build

# Round-trips prod.duckdb through S3 — see docs/decisions/0001-duckdb-execution.md.
# Concurrency is hard-capped to 1 to prevent two runners racing on the file.
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:
    inputs:
      target:
        description: 'dbt target'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: dbt-build-prod
      cancel-in-progress: false
    defaults:
      run:
        working-directory: transformation/dbt
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      DBT_TARGET: ${{ inputs.target || 'prod' }}
      DBT_DUCKDB_PATH: prod.duckdb
      DBT_PROFILES_DIR: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dbt
        run: uv pip install --system dbt-duckdb

      - name: Download prod.duckdb from S3 (if it exists)
        run: |
          if aws s3 ls "s3://${S3_BUCKET}/state/prod.duckdb" >/dev/null 2>&1; then
            echo "==> Downloading existing prod.duckdb"
            aws s3 cp "s3://${S3_BUCKET}/state/prod.duckdb" prod.duckdb
          else
            echo "==> No existing prod.duckdb — building from scratch"
          fi

      - name: dbt deps
        run: dbt deps --target "$DBT_TARGET"

      - name: Record start time
        run: echo "DBT_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: dbt build
        run: dbt build --target "$DBT_TARGET"

      - name: dbt source freshness
        if: always()
        run: dbt source freshness --target "$DBT_TARGET" || true

      - name: Export marts to S3 as Parquet
        if: success()
        run: python ../exports/export_marts.py

      - name: Upload prod.duckdb to S3
        if: success()
        run: aws s3 cp prod.duckdb "s3://${S3_BUCKET}/state/prod.duckdb"

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-target-${{ github.run_id }}
          path: transformation/dbt/target/
          retention-days: 7

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DBT_STATUS: ${{ job.status }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          STATUS="$DBT_STATUS"
          if [ "$STATUS" != "success" ]; then STATUS="failure"; fi
          DURATION=$(( $(date +%s) - ${DBT_START:-$(date +%s)} ))
          python orchestration/scripts/notify_slack.py \
            --status "$STATUS" \
            --job "dbt-build" \
            --run-url "$GITHUB_RUN_URL" \
            --run-number "$GITHUB_RUN_NUMBER" \
            --duration "$DURATION" \
            --dbt-results target/run_results.json \
            --dbt-manifest target/manifest.json \
            --freshness-results target/sources.json
