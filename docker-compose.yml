services:
  metabase:
    image: metabase/metabase:v0.50.27
    container_name: metabase
    ports:
      - "${MB_PORT:-3000}:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_PLUGINS_DIR: /plugins
    volumes:
      - metabase_data:/metabase-data
      - ./plugins:/plugins
      - ${DUCKDB_PATH:-./transformation/dbt/prod.duckdb}:/data/prod.duckdb:ro
    healthcheck:
      test: curl -f http://localhost:3000/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

volumes:
  metabase_data: