version: 2

models:
  - name: stg_lending__loan_applications
    description: "Cleansed loan application events from lending source."
    columns:
      - name: application_id
        description: "Primary key — deduplicated by latest _ingested_at"
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error

      - name: customer_id
        description: "Foreign key to dim_customers"
        tests:
          - not_null:
              config:
                severity: error

      - name: company_name
        description: "Company name on the loan application"

      - name: company_registration_number
        description: "Company registration number (empty strings coerced to NULL)"

      - name: country_code
        description: "ISO 3166-1 alpha-2 country code (cleansed; invalid codes set to NULL)"
        tests:
          - accepted_values:
              values: ["GB", "US", "CA", "CH", "SE", "NO", "DK", "IS", "DE", "FR", "IT", "ES", "NL", "BE", "AT", "PT", "IE", "FI", "LU", "EE", "LV", "LT", "SI", "SK", "MT", "CY", "GR", "HR", "PL", "CZ", "HU", "RO", "BG", "LI"]
              config:
                severity: warn

      - name: industry
        description: "Industry classification"

      - name: requested_amount
        description: "Requested loan amount in original currency (DECIMAL)"
        tests:
          - not_null:
              config:
                severity: warn

      - name: currency
        description: "ISO 4217 currency code (cleansed; invalid codes set to NULL)"
        tests:
          - accepted_values:
              values: ["GBP", "EUR", "CHF", "SEK", "NOK", "DKK", "ISK", "USD", "CAD"]
              config:
                severity: warn

      - name: application_date
        description: "Date the application was submitted (parsed to TIMESTAMP)"

      - name: status
        description: "Loan application status"
        tests:
          - accepted_values:
              values: ["approved", "rejected", "pending", "cancelled"]
              config:
                severity: warn

      - name: credit_score
        description: "Credit score at time of application (300–850, out-of-range set to NULL)"

      - name: risk_rating
        description: "Risk rating assigned during assessment"

      - name: headcount_at_application
        description: "Company headcount at time of application (BIGINT)"

      - name: valuation_at_application
        description: "Company valuation at time of application (DECIMAL)"

      - name: arr_at_application
        description: "Annual recurring revenue at time of application (DECIMAL)"

      - name: referral_source
        description: "Referral source (schema-drift column; may be NULL)"

      - name: _ingested_at
        description: "Wall-clock ingestion timestamp from raw events"

      - name: _schema_version
        description: "Schema version from raw events"