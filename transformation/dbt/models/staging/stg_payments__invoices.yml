version: 2

models:
  - name: stg_payments__invoices
    description: "Cleansed invoice events from payments source."
    columns:
      - name: invoice_id
        description: "Primary key — deduplicated by latest _ingested_at"
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error

      - name: customer_id
        description: "Foreign key to dim_customers"
        tests:
          - not_null:
              config:
                severity: error

      - name: subscription_id
        description: "Foreign key to stg_payments__subscriptions (nullable)"

      - name: amount
        description: "Invoice amount in original currency (major units, DECIMAL)"
        tests:
          - not_null:
              config:
                severity: warn

      - name: currency
        description: "ISO 4217 currency code (cleansed; invalid codes set to NULL)"
        tests:
          - accepted_values:
              values: ["GBP", "EUR", "CHF", "SEK", "NOK", "DKK", "ISK", "USD", "CAD"]
              config:
                severity: warn

      - name: invoice_date
        description: "Date the invoice was issued (parsed to TIMESTAMP)"

      - name: due_date
        description: "Date the invoice is due (parsed to TIMESTAMP)"

      - name: paid_at
        description: "Date the invoice was paid (parsed to TIMESTAMP, nullable)"

      - name: status
        description: "Invoice status"
        tests:
          - accepted_values:
              values: ["paid", "open", "void", "uncollectible"]
              config:
                severity: warn

      - name: line_items_json
        description: "Raw JSON string of line items (kept as string)"

      - name: _ingested_at
        description: "Wall-clock ingestion timestamp from raw events"

      - name: _schema_version
        description: "Schema version from raw events"