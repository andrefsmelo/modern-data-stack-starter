version: 2

models:
  - name: stg_lending__drawdowns
    description: "Cleansed drawdown events from lending source."
    columns:
      - name: drawdown_id
        description: "Primary key — deduplicated by latest _ingested_at (NULLs kept, not filtered)"
        tests:
          - unique:
              config:
                severity: error

      - name: facility_id
        description: "Foreign key to stg_lending__credit_facilities (orphaned OK)"
        tests:
          - not_null:
              config:
                severity: error

      - name: customer_id
        description: "Foreign key to dim_customers"
        tests:
          - not_null:
              config:
                severity: error

      - name: amount
        description: "Drawdown amount in original currency (DECIMAL; negative values set to NULL)"
        tests:
          - not_null:
              config:
                severity: warn

      - name: currency
        description: "ISO 4217 currency code (cleansed; invalid codes set to NULL)"
        tests:
          - accepted_values:
              values: ["GBP", "EUR", "CHF", "SEK", "NOK", "DKK", "ISK", "USD", "CAD"]
              config:
                severity: warn

      - name: drawdown_date
        description: "Date the drawdown was made (parsed to TIMESTAMP)"

      - name: purpose
        description: "Purpose of the drawdown"

      - name: status
        description: "Drawdown status"
        tests:
          - accepted_values:
              values: ["completed", "pending", "failed"]
              config:
                severity: warn

      - name: _ingested_at
        description: "Wall-clock ingestion timestamp from raw events"

      - name: _schema_version
        description: "Schema version from raw events"