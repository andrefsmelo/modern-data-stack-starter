version: 2

sources:
  - name: raw_events
    schema: main
    description: "Unified raw events landing table from S3 (Airbyte/dlt/Fivetran pattern)"

    tables:
      - name: payments_subscriptions
        description: "Payment subscription events"
        loader: dlt
        columns:
          - name: _ingested_at
            description: "Ingestion timestamp"
          - name: data
            description: "JSON payload"

      - name: payments_invoices
        description: "Payment invoice events"
        loader: dlt
        columns:
          - name: _ingested_at
            description: "Ingestion timestamp"
          - name: data
            description: "JSON payload"

