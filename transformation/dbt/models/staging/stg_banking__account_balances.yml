version: 2

models:
  - name: stg_banking__account_balances
    description: "Cleansed daily account balance snapshot events from banking source."
    columns:
      - name: snapshot_id
        description: "Primary key — deduplicated by latest _ingested_at"
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error

      - name: customer_id
        description: "Foreign key to dim_customers (orphaned OK)"
        tests:
          - not_null:
              config:
                severity: error

      - name: account_id
        description: "Account identifier"

      - name: currency
        description: "ISO 4217 currency code (cleansed; invalid codes set to NULL)"
        tests:
          - accepted_values:
              values: ["GBP", "EUR", "CHF", "SEK", "NOK", "DKK", "ISK", "USD", "CAD"]
              config:
                severity: warn

      - name: balance
        description: "Account balance in original currency (DECIMAL; negative values set to NULL)"
        tests:
          - not_null:
              config:
                severity: warn

      - name: snapshot_date
        description: "Date of the balance snapshot (parsed to TIMESTAMP)"

      - name: account_type
        description: "Account type"
        tests:
          - accepted_values:
              values: ["operating", "reserve", "fx"]
              config:
                severity: warn

      - name: _ingested_at
        description: "Wall-clock ingestion timestamp from raw events"

      - name: _schema_version
        description: "Schema version from raw events"