version: 2

models:
  - name: dim_credit_facilities
    description: "One row per credit facility with utilization metrics and an orphan flag indicating missing customer references."
    columns:
      - name: facility_id
        description: "Primary key — unique facility identifier"
        tests:
          - unique:
              config:
                severity: error
          - not_null:
              config:
                severity: error

      - name: application_id
        description: "Foreign key to the originating loan application (nullable)"

      - name: customer_id
        description: "Foreign key to dim_customers"
        tests:
          - not_null:
              config:
                severity: error
          - relationships:
              to: ref('dim_customers')
              field: customer_id
              config:
                severity: warn

      - name: facility_limit
        description: "Credit facility limit (DECIMAL)"

      - name: currency
        description: "ISO 4217 currency code of the facility"

      - name: approval_date
        description: "Date the facility was approved"

      - name: maturity_date
        description: "Date the facility matures"

      - name: facility_status
        description: "Facility status (renamed from 'status' to avoid reserved word)"

      - name: interest_rate
        description: "Interest rate applied to the facility (DOUBLE)"

      - name: current_utilization_pct
        description: "Current utilization percentage from int_facility_utilization"

      - name: is_orphaned
        description: "TRUE when the customer_id does not exist in dim_customers"
        tests:
          - accepted_values:
              values: [true, false]