name: modern_data_stack
version: "1.0.0"
config-version: 2

profile: modern_data_stack

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

models:
  modern_data_stack:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      dimensions:
        +schema: marts
      facts:
        +schema: marts

vars:
  dbt_duckdb_s3_region: "{{ env_var('AWS_REGION', 'eu-west-1') }}"